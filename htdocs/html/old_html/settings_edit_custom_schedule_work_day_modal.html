<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder redesign-version">

            <div class="popup-wrap modal-popup height100" style="display: block;">
                <div class="popup-inner">
                    <div class="popup-header">
                        <div class="newapp-title">Редактирование графика</div>
                        <span class="popup-closer">
                            <i class="ph-x"></i>
                        </span>
                    </div>
                    <div class="popup-body">
                        <div class="h-fixed">
                            <div class="newapp-body__wrap padd2 pb-0">
                                <ul class="filter-tags-list">
                                    <li class="w-x active">2 апр, чт</li>
                                    <li class="w-x active">3 апр, пт</li>
                                    <li class="w-x active">4 апр, сб</li>
                                </ul>
                                <div class="head-tabs-wrap">
                                    <ul class="head-tabs w50">
                                        <li class="active">Рабочий</li>
                                        <li>Нерабочий</li>
                                    </ul>
                                </div>
                                <form action="">
                                    <div class="custom-form__field block padd3">
                                        <div class="work-time" tabindex="0">
                                            <label class="work-time__label">Рабочее время</label>
                                            <div class="work-time__fields">
                                                <div class="work-time__group">
                                                    <span class="work-time__text">от</span>
                                                    <input class="work-time__input" type="time" required />
                                                </div>
                                                <div class="work-time__group">
                                                    <span class="work-time__text">до</span>
                                                    <input class="work-time__input" type="time" required />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="custom-form__field">
                                        <div class="custom-form__field-switch">
                                            <label>
                                                <input class="checkbox" type="checkbox" />
                                                <span class="switcher"></span>
                                                Сверхурочное
                                            </label>
                                        </div>
                                    </div>
                                    <div class="custom-form__field padd3-var3">
                                        <div class="custom-form__field-inn">
                                            <div class="work-time" tabindex="1">
                                                <label class="work-time__label">Рабочее время</label>
                                                <div class="work-time__fields">
                                                    <div class="work-time__group">
                                                        <span class="work-time__text">от</span>
                                                        <input class="work-time__input" type="time" required />
                                                    </div>
                                                    <div class="work-time__group">
                                                        <span class="work-time__text">до</span>
                                                        <input class="work-time__input" type="time" required />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="custom-form__field-inn">
                                            <div class="custom-form__field-del">
                                                <i class="ph-x"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="custom-form__field">
                                        <div class="custom-form__field-switch">
                                            <label>
                                                <input class="checkbox" type="checkbox" />
                                                <span class="switcher"></span>
                                                Сверхурочное
                                            </label>
                                        </div>
                                    </div>
                                    <div class="custom-form__field-link-add ta-center">
                                        <a href="">Добавить промежуток</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="popup-footer">
                        <div class="h-fixed">
                            <div class="popup-footer-inner">
                                <a class="btn" href="">Сохранить</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
