                        <h1 class="fw-600">Расписание</h1>
                        <a class="head-top-icon div-block color-2" href="">

                                    <li>
                                        <input type="radio" class="radio" id="t1" name="times">
                                        <label for="t1">15 мин</label>
                                    </li>
                                    <li>
                                        <input type="radio" class="radio" id="t2" name="times">
                                        <label for="t2">10 мин</label>
                                    </li>
                                    <li>

                                        <label for="t3">5 мин</label>
                                    </li>
                                </ul>
                            </div>
                            <div class="custom-form__field block pb-0">
                                <ul class="checkbox-list checkbox-list-var2 noborder pt-0 li-mp-0">
                                    <li>
                                        <label>
                                            <input class="checkbox" type="checkbox" />
                                            <span class="checkbox-view">
                                                <i class="ph-check-bold"></i>
                                            </span>

                                    </li>
                                </ul>

                                                <i class="ph-check-bold"></i>
                                            </span>
                                            2 дня
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input class="checkbox" type="checkbox" />
                                            <span class="checkbox-view">
                                                <i class="ph-check-bold"></i>
                                            </span>

                                        </label>

                                    <li>

                                            </span>

                                    </li>
                                    <li>
                                        <label>

                                                <i class="ph-check-bold"></i>
                                            </span>
                                            5 дней
                                        </label>
                                    </li>
                                    <li>
                                        <label>
                                            <input class="checkbox" type="checkbox" />
                                            <span class="checkbox-view">
                                                <i class="ph-check-bold"></i>
                                            </span>
                                            Месяц
                                        </label>
                                    </li>
