<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder h-header_var5 redesign-version">

            <header class="h-header header-sticky">
                <div class="h-fixed">
                    <div class="head-top">
                        <a class="back-to-prev" href="">
                            <i class="ph ph-arrow-left"></i>
                        </a>
                        <h1 class="fw-600">Настройки виджета</h1>
                    </div>
                </div>
            </header>

            <section class="h-content-wrap">
                <div class="h-wrap">

                    <div class="new-app-form-wrap pt-16">
                        <form action="">
                            <div class="sett__app-online-widget">
                                <div class="sett__app-online-widget-bg" style="background-image: url(../../f/i/settings_bg_2.jpg);"></div>
                                <div class="sett__app-online-widget-info">
                                    <div class="sett__app-online-widget-ava">
                                        <img src="../../f/i/settings_avatar.jpg" alt="" />
                                    </div>
                                    <span class="btn">Записаться</span>
                                </div>
                            </div>

                            <div class="custom-form__field block">
                                <div class="custom-form__field-link-add m-0 ptb-12">
                                    <a href="">Заменить фотографию профиля</a>
                                </div>

                                <div class="custom-form__field-link-add m-0 ptb-12">
                                    <a href="">Заменить фотографию фона</a>
                                </div>
                            </div>

                            <div class="custom-form__field pb-0 mb-16 relative with-float-label with-color-picker">
                                <input type="color" class="color-picker js-color-picker" />
                                <input class="text color-text js-color-picker-input" type="text" placeholder="" value="#148F2B" />
                                <label class="float-label">Цвет кнопки</label>
                                <span class="color-picker-badge js-color-picker-badge" style="background-color: #148F2B;"></span>
                            </div>

                            <div class="custom-form__field pb-0 mb-16 relative with-float-label with-color-picker">
                                <input type="color" class="color-picker js-color-picker" />
                                <input class="text color-text js-color-picker-input" type="text" placeholder="" value="#FFFFFF" />
                                <label class="float-label">Цвет текста на кнопке</label>
                                <span class="color-picker-badge js-color-picker-badge" style="background-color: #FFFFFF;"></span>
                            </div>
                            
                            <div class="new-app-form-footer">
                                <button class="btn submit" type="submit">Сохранить</button>
                            </div>
                        </form>
                    </div>

                </div>
            </section>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
