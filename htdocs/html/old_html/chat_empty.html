<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder redesign-version var2-content-bg">

            <div class="h-site-inner-holder">

                <header class="h-header header-sticky">
                    <div class="h-fixed">
                        <div class="head-top">
                            <a class="back-to-prev" href="">
                                <i class="ph ph-arrow-left"></i>
                            </a>
                            <h1 class="fw-600">Чат техподдержки</h1>
                        </div>
                    </div>
                </header>

                <section class="h-content-wrap">
                    <div class="h-wrap">

                        <div class="new-app-form-wrap">
                            <form class="new-app-form-item" action="">
                                <div class="new-app-form-main">
                                    <div class="chat-body">
                                        <div class="chat-messages-container">
                                            <div class="chat-date empty-chat">Сегодня</div>
                                        </div>
                                    </div>
                                </div>

                                <div class="new-app-form-footer">
                                    <div class="chat-submit">
                                        <div class="chat-download">
                                            <i class="ph ph-paperclip"></i>
                                        </div>
                                        <div class="custom-form__field mb-0 relative with-x">
                                            <textarea class="chat-textarea" rows="1" placeholder="Сообщение"></textarea>
                                            <input class="reset" type="reset" value="">
                                        </div>
                                        <button class="chat-btn" type="submit">
                                            <i class="ph ph-paper-plane-right"></i>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>

            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>

        <script type="">
            const textarea = document.querySelector('.chat-textarea');

            const styles = getComputedStyle(textarea);
            const lineHeight = parseFloat(styles.lineHeight);
            const paddingTop = parseFloat(styles.paddingTop);
            const paddingBottom = parseFloat(styles.paddingBottom);

            const minHeight = lineHeight + paddingTop + paddingBottom;
            const maxHeight = lineHeight * 5 + paddingTop + paddingBottom;

            function autoResize() {
                textarea.style.height = 'auto';

                const newHeight = Math.min(textarea.scrollHeight, maxHeight);

                textarea.style.height = `${Math.max(newHeight, minHeight)}px`;
                textarea.style.overflowY =
                    textarea.scrollHeight > maxHeight ? 'auto' : 'hidden';
            }

            textarea.addEventListener('input', autoResize);
            autoResize();
        </script>
    </body>

</html>
