<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder h-header_var4 h-red redesign-version">

            <header class="h-header">
                <div class="h-fixed">
                    <div class="head-top">
                        <a class="back-to-prev" href="">
                            <i class="ph ph-arrow-left"></i>
                        </a>
                        <h1 class="fw-600">Новая операция</h1>
                    </div>
                </div>
            </header>

            <section class="h-content-wrap">
                <div class="h-wrap">

                    <div class="income-form-wrap">
                        <ul class="head-tabs w50">
                            <li class="active">Добавить</li>
                            <li>Изъять</li>
                        </ul>

                        <ul class="box-items-list staff-list with-borders">
                            <li class="chosen">
                                <a class="flex-item master-info fixed-height" href="">
                                    <div class="valign">
                                        <span class="name">19 октября 2023 г.</span>
                                    </div>
                                    <i class="ph-caret-right"></i>
                                </a>
                            </li>
                            <li>
                                <a class="flex-item master-info fixed-height" href="">
                                    <div class="valign">
                                        <span class="name">Статья прихода</span>
                                    </div>
                                    <i class="ph-caret-right"></i>
                                </a>
                            </li>
                        </ul>

                        <form action="">
                            <div class="custom-form__field block relative with-float-label padd3">
                                <input class="text" type="text" placeholder="" />
                                <label class="float-label">Сумма</label>
                            </div>
                            <div class="custom-form__field block relative">
                                <div class="custom-form__field-switch">
                                    <label>
                                        <input class="checkbox" type="checkbox">
                                        <span class="switcher"></span>
                                        Безналичные
                                    </label>
                                </div>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <textarea class="text" placeholder=""></textarea>
                                <label class="float-label">Примечание</label>
                            </div>
                            <ul class="box-items-list staff-list no-padding with-borders">
                                <li>
                                    <a class="flex-item master-info fixed-height" href="">
                                        <div class="valign">
                                            <span class="name">
                                                Счет зачисления
                                                <span class="all-dop">4</span>
                                            </span>
                                        </div>
                                        <i class="ph-caret-right"></i>
                                    </a>
                                </li>
                            </ul>
                            <div class="custom-form__field with-btn">
                                <button type="submit" class="btn">Добавить</button>
                            </div>
                        </form>
                    </div>

                </div>
            </section>

            <div class="popup-wrap modal-popup" style="display: block;">
                <div class="popup-inner">
                    <div class="popup-header">
                        <h2 class="newapp-title">Кассы</h2>
                        <span class="popup-closer"><i class="ph-x"></i></span>
                    </div>
                    <div class="popup-body">
                        <div class="h-fixed">
                            <div class="popup-body-inner-top">
                                <form action="">
                                    <div class="custom-form__field block with-float-label pos-absolute-var2">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Сумма</label>
                                        <span class="abs-currency">
                                            <i class="ph-currency-rub-bold"></i>
                                        </span>
                                    </div>
                                    <div class="custom-form__field block">
                                        <span class="info-message">
                                            Если вы используете дополнительные кассы, укажите суммы в нужных полях
                                        </span>
                                    </div>
                                    <div class="custom-form__field block with-float-label pos-absolute-var2 mb-16">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Дополнительная</label>
                                        <span class="abs-currency">
                                            <i class="ph-currency-rub-bold"></i>
                                        </span>
                                    </div>
                                    <div class="custom-form__field block with-float-label pos-absolute-var2 mb-16">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Накопительный счет</label>
                                        <span class="abs-currency">
                                            <i class="ph-currency-rub-bold"></i>
                                        </span>
                                    </div>
                                    <div class="custom-form__field block with-float-label pos-absolute-var2 mb-16">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Карта 6024</label>
                                        <span class="abs-currency">
                                            <i class="ph-currency-rub-bold"></i>
                                        </span>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="popup-footer">
                            <div class="h-fixed">
                                <a class="btn" href="">Сохранить</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
