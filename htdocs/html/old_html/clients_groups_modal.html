<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder redesign-version">

            <header class="h-header header-sticky">
                <div class="h-fixed">
                    <div class="head-top">
                        <a class="back-to-prev" href="">
                            <i class="ph ph-arrow-left"></i>
                        </a>
                        <h1 class="fw-600">Новый клиент</h1>
                    </div>
                </div>
            </header>

            <section class="h-content-wrap">
                <div class="h-wrap">

                    <div class="new-app-form-wrap pt-16">
                        <form action="">
                            <div class="custom-form__field block relative with-float-label">
                                <input class="text" type="text" placeholder="" />
                                <label class="float-label">Имя клиента</label>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <input class="text" type="text" placeholder="" />
                                <label class="float-label">Телефон</label>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <input class="text" type="text" placeholder="" />
                                <label class="float-label">Электронная почта</label>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <input class="text" type="text" placeholder="" />
                                <label class="float-label">Скидка</label>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <textarea class="text" placeholder=""></textarea>
                                <label class="float-label">О клиенте</label>
                            </div>
                            <ul class="box-items-list staff-list no-padding with-borders">
                                <li>
                                    <a class="flex-item master-info fixed-height" href="">
                                        <div class="valign">
                                            <span class="name">
                                                Группы
                                            </span>
                                        </div>
                                        <i class="ph-caret-right"></i>
                                    </a>
                                </li>
                            </ul>

                            <div class="new-app-form-footer">
                                <button class="btn submit save-btn" type="submit">Сохранить</button>
                            </div>
                        </form>
                    </div>

                </div>
            </section>

            <div class="popup-wrap modal-popup" style="display: block;">
                <div class="popup-inner">
                    <div class="popup-header">
                        <div class="newapp-title">Группы</div>
                        <span class="popup-closer"><i class="ph-x"></i></span>
                    </div>
                    <div class="popup-body">
                        <div class="h-fixed">
                            <div class="newapp-body__wrap padd2">
                                <ul class="newapp-popup-list-choose">
                                    <li class="active">
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Выезд</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li class="active">
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">L'OREAL</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li class="active">
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">Airtouch</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">Тёмное окрашивание</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">Осветление / блонд</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">Яркие цвета</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">Повреждённые волосы</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                        <span class="newapp-popup-list-choose-copy">Чувствительная кожа</span>
                                        <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                </ul>

                                <div class="add-new-client-from pb-0">
                                    <form action="">
                                        <div class="custom-form__field block relative with-float-label padd3">
                                            <input class="text" type="text" placeholder="" />
                                            <label class="float-label">Новая группа</label>
                                        </div>
                                        <div class="custom-form__field block relative last">
                                            <div class="custom-form__field-switch">
                                                <label>
                                                    <input class="checkbox" type="checkbox">
                                                    <span class="switcher"></span>
                                                    Включить клиента в группу
                                                </label>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="popup-footer">
                        <div class="h-fixed">
                            <a class="btn" href="">Сохранить</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
