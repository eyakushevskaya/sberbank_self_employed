<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous">
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder h-header_var5 redesign-version">

            <header class="h-header">
                <div class="h-fixed">
                    <div class="head-top">
                        <a class="back-to-prev" href="">
                            <i class="ph ph-arrow-left"></i>
                        </a>
                        <h1>Профиль</h1>
                    </div>
                </div>
            </header>

            <section class="h-content-wrap">
                <div class="new-app-form-wrap">
                    <form action="">
                        <div class="h-content-round-wrap">
                            <div class="b-content-round-item">
                                <div class="h-wrap">
                                    <div class="custom-form__field block relative">
                                        <div class="custom-form__field-avatar">
                                            <i class="ph ph-camera"></i>
                                            <img src="../../f/i/profile-avatar.jpg" width="100%" height="100%" alt="" />
                                        </div>
                                        <ul class="custom-form__field-avatar-actions">
                                            <li>
                                                <a href="">Заменить фото</a>
                                            </li>
                                            <li>
                                                <a href="">Удалить фото</a>
                                            </li>
                                        </ul>
                                    </div>
                                    <div class="custom-form__field block relative with-float-label">
                                        <input class="text" type="text" autofocus placeholder="" />
                                        <label class="float-label">Фамилия</label>
                                    </div>
                                    <div class="custom-form__field block relative with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Имя</label>
                                    </div>
                                    <div class="custom-form__field block relative with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Отчество</label>
                                    </div>
                                    <div class="custom-form__field block relative with-float-label">
                                        <input class="text" type="number" placeholder="" />
                                        <label class="float-label">Телефон</label>
                                    </div>
                                    <div class="custom-form__field last block relative with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Электронная почта</label>
                                    </div>
                                </div>
                            </div>

                            <div class="b-content-round-item">
                                <div class="h-wrap">
                                    <h2 class="b-content-round-item-title">Деятельность</h2>
                                    <div class="custom-form__field block relative with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Специализация</label>
                                    </div>
                                    <div class="custom-form__field block relative with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Город (местность), где оказываете услуги</label>
                                    </div>
                                    <div class="custom-form__field pt-8 relative">
                                        <div class="custom-form__field-switch">
                                            <label>
                                                <input class="checkbox" type="checkbox">
                                                <span class="switcher"></span>
                                                Готов выезжать к клиенту
                                            </label>
                                        </div>
                                    </div>
                                    <div class="custom-form__field block relative">
                                        <div class="work-time" tabindex="0">
                                            <label class="work-time__label">Рабочее время</label>
                                            <div class="work-time__fields">
                                                <div class="work-time__group">
                                                    <span class="work-time__text">от</span>
                                                    <input class="work-time__input" type="time" required />
                                                </div>
                                                <div class="work-time__group">
                                                    <span class="work-time__text">до</span>
                                                    <input class="work-time__input" type="time" required />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="custom-form__field last block relative with-float-label">
                                        <textarea class="text" placeholder=""></textarea>
                                        <label class="float-label">Описание</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="new-app-form-footer">
                            <a class="btn" href="">Сохранить</a>
                        </div>
                    </form>
                </div>
            </section>

            <div class="popup-wrap modal-popup height100" style="display: block;">
                <div class="popup-inner">
                    <div class="popup-header">
                        <div class="newapp-title">Выберите город</div>
                        <span class="popup-closer">
                            <i class="ph-x"></i>
                        </span>
                    </div>
                    <div class="popup-body">
                        <div class="h-fixed">
                            <div class="newapp-body__wrap">
                                <div class="searchbox">
                                    <form action="">
                                        <fieldset>
                                            <input type="text" class="text" placeholder="Город" />
                                            <i class="ph-magnifying-glass" aria-hidden="true"></i>
                                        </fieldset>
                                    </form>
                                </div>

                                <ul class="newapp-popup-list-choose">
                                    <li class="active">
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Москва</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Санкт-Петербург</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Абаза</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Абакан</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Абдулино</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="">
                                            <span class="newapp-popup-list-choose-copy">Город</span>
                                            <i class="ph-check-bold"></i>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>

</html>
