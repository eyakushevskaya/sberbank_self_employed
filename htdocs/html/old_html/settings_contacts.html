<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder redesign-version">

            <div class="h-site-inner-holder">

                <header class="h-header header-sticky">
                    <div class="h-fixed">
                        <div class="head-top">
                            <a class="back-to-prev" href="">
                                <i class="ph ph-arrow-left"></i>
                            </a>
                            <h1 class="fw-600">Контакты и связь</h1>
                        </div>
                    </div>
                </header>

                <section class="h-content-wrap">
                    <div class="h-wrap">

                        <div class="new-app-form-wrap">
                            <form class="new-app-form-item" action="">
                                <div class="new-app-form-main">
                                    <div class="sett__app-online-item-main">
                                        Эту информацию увидят ваши клиенты в виджете онлайн-записи. Указывайте только ту информацию, которую хотите сделать общедоступной
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <div class="phone-code" tabindex="0">
                                            <label class="phone-code__label">Контактный телефон</label>
                                            <div class="phone-code__field">
                                                <span class="phone-code__text">
                                                    +7
                                                    <i class="ph ph-caret-down"></i>
                                                </span>
                                                <input class="phone-code__input" type="number" required="" />
                                            </div>
                                        </div>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Электронная почта</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Адрес оказания услуг</label>
                                    </div>

                                    <h2 class="b-content-round-item-title mt-0 pt-16">Мессенджеры</h2>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Max</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Telegram</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">VK Мессенджер</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <div class="phone-code" tabindex="0">
                                            <label class="phone-code__label">WhatsApp</label>
                                            <div class="phone-code__field">
                                                <span class="phone-code__text">
                                                    +7
                                                    <i class="ph ph-caret-down"></i>
                                                </span>
                                                <input class="phone-code__input" type="number" required="" />
                                            </div>
                                        </div>
                                    </div>

                                    <h2 class="b-content-round-item-title mt-0 pt-16">Социальные сети</h2>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">ВКонтакте</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Telegram-канал</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">VK Видео</label>
                                    </div>

                                    <div class="custom-form__field block with-float-label">
                                        <input class="text" type="text" placeholder="" />
                                        <label class="float-label">Rutube</label>
                                    </div>

                                    <div class="custom-form__field block last">
                                        <ul class="checkbox-list checkbox-list-var2 noborder pt-0 li-mp-0">
                                            <li>
                                                <label>
                                                    <input class="checkbox" type="checkbox">
                                                    <span class="checkbox-view">
                                                        <i class="ph-check-bold"></i>
                                                    </span>
                                                    Я даю согласие на публикацию моих контактных данных
                                                </label>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                
                                <div class="new-app-form-footer">
                                    <button class="btn submit" type="submit">Сохранить</button>
                                </div>
                            </form>
                        </div>

                    </div>
                </section>
                
            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
