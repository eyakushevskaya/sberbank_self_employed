<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder home-type redesign-version popup-inner">

            <header class="h-header popup-header">
                <h1 class="logo">
                    <a href="">Сбербанк</a>
                    <span class="welcome">Добро пожаловать в сервис для самозанятых</span>
                </h1>
            </header>

            <section class="h-content-wrap popup-body">
                <div class="h-wrap">
                    <form class="auth" action="">
                        <div class="custom-form__field block relative with-float-label error">
                            <input class="text" type="text" autofocus placeholder="" />
                            <label class="float-label">Логин</label>
                        </div>
                        <div class="custom-form__field block relative with-float-label error">
                            <input id="password-field" class="text" type="password" placeholder="" />
                            <label class="float-label">Пароль</label>
                            <input class="reset" type="reset" value="" />
                            <span toggle="#password-field" class="toggle-password eye-slash"></span>
                            <div class="error_message">Неверный логин или пароль</div>
                        </div>
                        <div class="custom-form__field with-btn">
                            <button type="submit" class="btn">Войти</button>
                        </div>
                    </form>
                </div>
            </section>

            <div class="popup-footer">
                <div class="h-fixed">
                    <div class="popup-footer_title">Нет учетной записи?</div>
                    <a class="btn gray" href="">Зарегистрируйтесь</a>
                </div>
            </div>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
