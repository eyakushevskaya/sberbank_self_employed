<!DOCTYPE html>
<html class="no-js">

    <head>
        <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=1">
        <meta content="" name="Description">
        <meta content="" name="Keywords">
        <meta content="index,follow" name="robots">
        <meta content="yes" name="apple-mobile-web-app-capable">
        <title>Сбербанк</title>
        <link href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet" type="text/css">
        <link href="../../f/css/main.css" rel="stylesheet" type="text/css">
    </head>

    <body>

        <div class="h-holder redesign-version">

            <header class="h-header header-sticky">
                <div class="h-fixed">
                    <div class="head-top">
                        <a class="back-to-prev" href="">
                            <i class="ph ph-arrow-left"></i>
                        </a>
                        <h1 class="fw-600">Изменение услуги</h1>
                    </div>
                </div>
            </header>

            <section class="h-content-wrap">
                <div class="h-wrap">

                    <div class="new-app-form-wrap pt-16">
                        <form action="">
                            <div class="custom-form__field block">
                                <div class="upload-image-wrap">
                                    <img src="../../f/i/services-avatar.jpg" alt="" />
                                </div>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <input class="text" type="text" placeholder="" value="Окрашивание Airtouch" />
                                <label class="float-label">Услуга</label>
                            </div>
                            <div class="custom-form__field block relative with-float-label padd3">
                                <input class="text" type="text" placeholder="" value="20 000 ₽" />
                                <label class="float-label">Стоиость</label>
                            </div>
                            <div class="custom-form__field block padd3">
                                <span class="info-message">
                                    Если услуга предоставляется бесплатно, оставьте поле пустым
                                </span>
                                <div class="custom-form__field block padd3">
                                    <div class="custom-form__field-switch">
                                        <label>
                                            <input class="checkbox" type="checkbox">
                                            <span class="switcher"></span>
                                            Цена «от»
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <ul class="box-items-list staff-list no-padding with-borders">
                                <li class="chosen">
                                    <a class="flex-item master-info fixed-height" href="">
                                        <div class="valign">
                                            <span class="name">
                                                6 ч 30 мин
                                            </span>
                                        </div>
                                        <i class="ph-caret-right"></i>
                                    </a>
                                </li>
                            </ul>
                            <div class="custom-form__field block relative">
                                <div class="custom-form__field-switch">
                                    <label>
                                        <input class="checkbox" type="checkbox" checked />
                                        <span class="switcher"></span>
                                        Доступна онлайн
                                    </label>
                                </div>
                            </div>
                            <div class="custom-form__field block relative with-float-label">
                                <textarea class="text" placeholder="">Подбор оттенка, окрашивание, уход, мытье головы, укладка</textarea>
                                <label class="float-label">Дополнительное описание</label>
                            </div>

                            <div class="new-app-form-footer">
                                <button class="btn submit save-btn" type="submit">Сохранить</button>
                            </div>
                        </form>
                    </div>

                </div>
            </section>

        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.js" type="text/javascript"></script>
        <script src="https://code.jquery.com/ui/1.12.0/jquery-ui.min.js" type="text/javascript"></script>
        <script src="../../f/js/main.js" type="text/javascript"></script>
    </body>

</html>
