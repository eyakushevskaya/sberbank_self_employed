<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">

        <style>
            @font-face {
                font-family: "Inter";
                src: url("fonts/Inter-cyrillic.woff2") format("woff2");
                font-weight: 400, 500, 600, 900;
            }

            @font-face {
                font-family: "Inter";
                src: url("fonts/Inter-latin.woff2") format("woff2");
                font-weight: 400, 500, 600, 900;
            }

            html {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            body {
                box-sizing: border-box;
                width: 100mm;
                height: 100mm;
                margin: 0 auto;
                padding: 5mm 14mm;
            }

            body {
                font-family: "Inter";
                background: rgba(255, 255, 255, 1);
            }

            .pdf-page {
                text-align: center;
                color: rgba(0, 0, 0, 1);
            }

            .title {
                margin: 0 0 2.5mm;
                font-size: 18pt;
                line-height: normal;
                font-weight: 600;
            }

            .qr {
                width: 62.8mm;
                height: 62.8mm;
                display: block;
                margin: 0 auto;
            }

            .text {
                margin: 0 0 5mm;
                font-size: 9pt;
                font-weight: 400;
            }

            .footer {
                margin: 0;
                font-size: 7.5pt;
                color: rgba(0, 0, 0, 0.70);
            }

            .footer strong {
                font-weight: 900;
            }
        </style>
    </head>

    <body>
        <div class="pdf-page">
            <h1 class="title">Онлайн-запись</h1>

            <img class="qr" src="images/qr_100x100.svg" width="62.8mm" alt="QR-код">

            <p class="text">Наведите камеру на QR-код</p>

            <p class="footer">Работает на <strong>СОНЛАЙН</strong></p>
        </div>
    </body>
</html>
