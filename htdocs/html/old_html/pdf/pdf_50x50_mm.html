<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">

        <style>
            @font-face {
                font-family: "Inter";
                src: url("fonts/Inter-cyrillic.woff2") format("woff2");
                font-weight: 400, 500, 600, 900;
            }

            @font-face {
                font-family: "Inter";
                src: url("fonts/Inter-latin.woff2") format("woff2");
                font-weight: 400, 500, 600, 900;
            }

            html {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            body {
                width: 50mm;
                height: 50mm;
                margin: 0 auto;
                padding: 0;
            }

            body {
                font-family: "Inter";
                background: rgba(255, 255, 255, 1);
            }

            .pdf-page {
                text-align: center;
                color: rgba(0, 0, 0, 1);
            }

            .qr {
                width: 50mm;
                height: 50mm;
                display: block;
                margin: 0 auto;
            }
        </style>
    </head>

    <body>
        <div class="pdf-page">

            <img class="qr" src="images/qr_50x50.svg" width="50mm" alt="QR-код">

        </div>
    </body>
</html>
