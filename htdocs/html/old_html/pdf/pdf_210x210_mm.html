<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">

        <style>
            @font-face {
                font-family: "Inter";
                src: url("fonts/Inter-cyrillic.woff2") format("woff2");
                font-weight: 400, 500, 600, 900;
            }

            @font-face {
                font-family: "Inter";
                src: url("fonts/Inter-latin.woff2") format("woff2");
                font-weight: 400, 500, 600, 900;
            }

            html {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            body {
                box-sizing: border-box;
                width: 210mm;
                height: 210mm;
                margin: 0 auto;
                padding: 30mm 20mm;
                border: 1px solid rgba(0, 0, 0, 0.50);
                border-radius: 999px;
            }

            body {
                font-family: "Inter";
                background: rgba(255, 255, 255, 1);
            }

            .pdf-page {
                text-align: center;
                color: rgba(0, 0, 0, 1);
            }

            .title {
                margin: 0 0 5mm;
                font-size: 30pt;
                line-height: normal;
                font-weight: 600;
            }

            .sub-title {
                margin: 0 0 5mm;
                font-size: 15pt;
                line-height: normal;
                font-weight: 500;
            }

            .qr {
                width: 113.3mm;
                height: 113.3mm;
                display: block;
                margin: 0 auto;
            }

            .text {
                margin: 0 0 10mm;
                font-size: 12pt;
                font-weight: 400;
            }

            .footer {
                margin: 0;
                font-size: 9pt;
                color: rgba(0, 0, 0, 0.70);
            }

            .footer strong {
                font-weight: 900;
            }
        </style>
    </head>

    <body>
        <div class="pdf-page">
            <h1 class="title">Онлайн-запись</h1>

            <h2 class="sub-title">Арина Волкова</h2>

            <img class="qr" src="images/qr_210x210.svg" width="113.3mm" alt="QR-код">

            <p class="text">Наведите камеру на QR-код</p>

            <p class="footer">Работает на <strong>СОНЛАЙН</strong></p>
        </div>
    </body>
</html>
